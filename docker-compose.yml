version: '3.8'

services:
  image-saver:
    build: .
    container_name: image_saver_app
    restart: always
    ports:
      - "8080:5000"

    environment:
      # ── Auth ───────────────────────────────────────────────
      MASTER_TOKEN: "CHANGE_ME_BEFORE_DEPLOY"

      # ── Storage backend: "local" or "s3" ───────────────────
      STORAGE_BACKEND: "local"
      UPLOAD_FOLDER: /app/uploads

      # ── S3 / DigitalOcean Spaces (used when STORAGE_BACKEND=s3) ──
      # S3_BUCKET: "my-images-bucket"
      # S3_ENDPOINT_URL: "https://nyc3.digitaloceanspaces.com"
      # S3_ACCESS_KEY: ""
      # S3_SECRET_KEY: ""
      # S3_REGION: "nyc3"
      # S3_PUBLIC_URL: ""       # optional CDN base URL

      # ── Token management ───────────────────────────────────
      TOKEN_FILE_PATH: /app/config/tokens.txt
      TOKEN_RELOAD_INTERVAL: "30"

      # ── Upload constraints ─────────────────────────────────
      MAX_FILE_SIZE: "10485760"        # 10 MB
      ALLOWED_MIME_TYPES: "image/jpeg,image/png"
      RATE_LIMIT: "60/minute"

      # ── Logging ────────────────────────────────────────────
      LOG_FOLDER: /app/logs

    volumes:
      - ./storage/images:/app/uploads
      - ./logs:/app/logs
      - ./config/tokens.txt:/app/config/tokens.txt:ro
