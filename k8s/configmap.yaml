apiVersion: v1
kind: ConfigMap
metadata:
  name: image-saver-config
  namespace: default
data:
  STORAGE_BACKEND: "s3"
  TOKEN_FILE_PATH: "/app/config/tokens.txt"
  TOKEN_RELOAD_INTERVAL: "30"
  MAX_FILE_SIZE: "10485760"
  ALLOWED_MIME_TYPES: "image/jpeg,image/png"
  RATE_LIMIT: "60/minute"
  # Empty = logs go to stdout only (correct for K8s / log aggregators)
  LOG_FOLDER: ""
