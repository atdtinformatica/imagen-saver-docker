# Copy to secret.yaml, fill in values, then apply.
# Do NOT commit secret.yaml to version control.
#
# Apply with:  kubectl apply -f k8s/secret.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: image-saver-secrets
  namespace: default
type: Opaque
stringData:
  # Admin token for /admin/reload-tokens
  MASTER_TOKEN: "change-me-strong-random-value"

  # S3 / DigitalOcean Spaces credentials
  S3_BUCKET: "my-images-bucket"
  S3_ENDPOINT_URL: "https://nyc3.digitaloceanspaces.com"
  S3_ACCESS_KEY: "your-spaces-access-key"
  S3_SECRET_KEY: "your-spaces-secret-key"
  S3_REGION: "nyc3"
  S3_PUBLIC_URL: ""   # optional: CDN base URL, e.g. https://cdn.example.com

---
# Upload tokens — one per line, '#' for comments.
# Mounted read-only at /app/config/tokens.txt inside the container.
apiVersion: v1
kind: Secret
metadata:
  name: image-saver-tokens
  namespace: default
type: Opaque
stringData:
  tokens.txt: |
    # Add one token per line
    CLIENTE-A-TOKEN-REPLACE-ME
    CLIENTE-B-TOKEN-REPLACE-ME
