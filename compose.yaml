services:
  image-saver:
    build: .
    container_name: image_saver_app
    restart: always
    ports:
      - "8080:5000"

    env_file:
      - path: .env
        required: false   # allows running without .env (uses defaults below)

    environment:
      # ── Storage backend: "local" or "s3" ───────────────────
      STORAGE_BACKEND: "${STORAGE_BACKEND:-local}"
      UPLOAD_FOLDER: /app/uploads

      # ── S3 / DigitalOcean Spaces (used when STORAGE_BACKEND=s3) ──
      S3_BUCKET:        "${S3_BUCKET:-}"
      S3_ENDPOINT_URL:  "${S3_ENDPOINT_URL:-}"
      S3_ACCESS_KEY:    "${S3_ACCESS_KEY:-}"
      S3_SECRET_KEY:    "${S3_SECRET_KEY:-}"
      S3_REGION:        "${S3_REGION:-us-east-1}"
      S3_PUBLIC_URL:    "${S3_PUBLIC_URL:-}"

      # ── Auth ───────────────────────────────────────────────
      MASTER_TOKEN: "${MASTER_TOKEN:-CHANGE_ME_BEFORE_DEPLOY}"

      # ── Token management ───────────────────────────────────
      TOKEN_FILE_PATH: /app/config/tokens.txt
      TOKEN_RELOAD_INTERVAL: "10"

      # ── Upload constraints ─────────────────────────────────
      MAX_FILE_SIZE: "10485760"
      ALLOWED_MIME_TYPES: "image/jpeg,image/png"
      RATE_LIMIT: "60/minute"

      # ── Logging ────────────────────────────────────────────
      LOG_FOLDER: /app/logs

    volumes:
      - ./storage/images:/app/uploads
      - ./logs:/app/logs
      - ./config/tokens.txt:/app/config/tokens.txt:ro

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
